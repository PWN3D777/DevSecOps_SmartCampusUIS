services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    env_file: .env
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRESQL_USER}
      - POSTGRES_DB=${POSTGRESQL_DB}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD}
    networks:
      - iot_campus_uis

  emqx:
    user: root
    image: "emqx/emqx:5.8"
    container_name: emqx
    ports:
      - "18083:18083"
      - "1883:1883"
    volumes:
      - ./data/emqx/data:/opt/emqx/data
      - ./data/emqx/log:/opt/emqx/log
    networks:
      - iot_campus_uis

  influxdb:
    image: "influxdb:2.7.11"
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./data/influxdb/data:/var/lib/influxdb2
      - ./data/influxdb/config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admindb
      - DOCKER_INFLUXDB_INIT_PASSWORD=smartcampusuis
      - DOCKER_INFLUXDB_INIT_ORG=uis
      - DOCKER_INFLUXDB_INIT_BUCKET=iotuis
      - DOCKER_INFLUXDB_INIT_RETENTION=1w
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=smartcampusuis-iot-auth-token
    networks:
      - iot_campus_uis

  telegraf:
    image: "telegraf:1.33"
    container_name: telegraf
    volumes:
      - ./data/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf
    depends_on:
      - emqx
      - influxdb
    restart: unless-stopped
    networks:
      - iot_campus_uis

  mongo:
    image: mongo
    restart: always
    ports:
      - 27017:27017
    networks:
      - iot_campus_uis

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - iot_campus_uis

  minio:
    image: minio/minio:latest
    command: server --console-address ":9001" /data
    restart: always
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio/data:/data
    networks:
      - iot_campus_uis

  admin:
    restart: always
    depends_on:
      - db
    build: admin_microservice
    #ports:
    #  - 8081:8081
    environment:
      - POSTGRESQL_HOST=db
      - POSTGRESQL_PORT=${POSTGRESQL_PORT}
      - POSTGRESQL_DB=${POSTGRESQL_DB}
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - ADMIN_SERVICE_PORT=${ADMIN_SERVICE_PORT}
    networks:
      - iot_campus_uis

  data:
    restart: always
    env_file: .env
    depends_on:
      - mongo
      - rabbitmq
      - influxdb
      - minio
      - emqx
    build: data_microservice
    ports:
      - 8082:8082
    environment:
      - DATA_SERVICE_PORT=${DATA_SERVICE_PORT}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - TOPIC_LISTENER=${TOPIC_LISTENER}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL}
      - MQTT_BROKER_CLIENT_ID=${MQTT_BROKER_CLIENT_ID}
      - INFLUXDB_URL=${INFLUXDB_URL}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_DATABASE=${MONGO_DATABASE}
      - MONGO_AUTH_DB=${MONGO_AUTH_DB}
      - MONGO_USERNAME=${MONGO_USERNAME}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
    networks:
      - iot_campus_uis

  gateway:
    restart: always
    build: go_gateway
    depends_on:
      - admin
    ports:
      - 8080:8080
    environment:
      - ADMIN_HOST=http://admin:${ADMIN_SERVICE_PORT}
      - DATA_HOST=http://data:${DATA_SERVICE_PORT}
      - GATEWAY_PORT=${GATEWAY_PORT}
    networks:
      - iot_campus_uis

  frontend:
    restart: always
    build: frontend_admin
    depends_on:
      - admin
      - gateway
      - data
    ports:
      - 4000:80
    networks:
      - iot_campus_uis

  grafana:
    image: "grafana/grafana:11.5.0"
    container_name: grafana
    ports:
      - "3000:3000"
    user: "$UID:$GID"
    volumes:
      - '$PWD/data/grafana:/var/lib/grafana'
    networks:
      - iot_campus_uis
    depends_on:
      - influxdb

networks:
  iot_campus_uis:
    driver: bridge
